<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Koralytics - Site en construction</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            min-height: 100vh;
            margin: 0;
            padding: 0;
            background: #f5f6fa;
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .logo {
            max-width: 220px;
            margin-bottom: 30px;
        }
        .logo img {
            width: 100%;
            height: auto;
            display: block;
        }
        .construction-text {
            font-size: 16px;
            font-weight: bold;
            color: #C9B88A;
            margin-top: 20px;
            letter-spacing: 1px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="logo">
        <img src="Logo_Koralytics.svg" alt="Logo Koralytics">
    </div>
    <div class="construction-text">
        Site en construction...
    </div>
</body>
</html>
